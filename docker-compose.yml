services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fermentor-db
    environment:
      POSTGRES_USER: fermentor
      POSTGRES_PASSWORD: fermentor
      POSTGRES_DB: fermentor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fermentor -d fermentor"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
