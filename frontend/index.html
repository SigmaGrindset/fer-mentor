<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B3D46" />
    <meta
      name="description"
      content="FERmentor — pronađi mentora za svoj završni ili diplomski rad na FER-u na temelju opisa teme."
    />
    <!-- Social cards (Open Graph + Twitter). The image is a static PNG in
         /public so shared links render a branded card with zero runtime cost.
         URLs must be absolute for crawlers, hence the hardcoded prod origin. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FERmentor" />
    <meta property="og:locale" content="hr_HR" />
    <meta property="og:title" content="FERmentor — pronađi mentora za svoj rad" />
    <meta
      property="og:description"
      content="Opiši temu svojim riječima — FERmentor predlaže mentore na FER-u čiji se dosadašnji radovi najbolje podudaraju."
    />
    <meta property="og:url" content="https://fermentor.vercel.app/" />
    <meta property="og:image" content="https://fermentor.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FERmentor — pronađi mentora za svoj rad" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FERmentor — pronađi mentora za svoj rad" />
    <meta
      name="twitter:description"
      content="Opiši temu svojim riječima — FERmentor predlaže mentore na FER-u čiji se dosadašnji radovi najbolje podudaraju."
    />
    <meta name="twitter:image" content="https://fermentor.vercel.app/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>FERmentor — pronađi mentora za svoj rad</title>
    <!-- Apply theme before first paint to avoid a flash of the light theme.
         Mirrors useTheme: a plain-string 'fermentor-theme' key, else OS pref. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('fermentor-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
